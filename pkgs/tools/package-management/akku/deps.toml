[ac-d-bus]
dependencies = ["r6rs-pffi", "chibi-match", "packrat", "loko-srfi"]
synopsis = "AC/D-Bus - D-Bus wire protocol"
longdesc = """
AC/D-Bus is an implementation of the D-Bus wire protocol.

D-Bus is an interprocess communication protocol popular on GNU/Linux systems
to communicate with a variety of services. Originally designed for desktop
environments, it is now used by programs like VLC media player, BlueZ,
NetworkManager, Pulseaudio, systemd (including logind and resolved), Polkit,
gnome-keyring, and many more.

This version supports Chez Scheme, GNU Guile, Loko Scheme, Sagittarius Scheme
and Vicare Scheme.

"""
url = "https://archive.akkuscm.org/archive/pkg/a/ac-d-bus_1.0.0-beta.0_repack.tar.xz"
sha256 = "8Wk0oW++w1uGAzokCobBbgkZSqUxIGw/jL2LITvn4Us="

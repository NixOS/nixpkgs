[chez-srfi]
dependencies = []
synopsis = "Portable SRFI collection"
longdesc = """
SRFI is short for Scheme Requests for Implementation and its homepage
describes it as a process to help Scheme users write portable, useful code.
It is similar to PEPs for Python or JSRs for Java.

This package provides implementations of SRFIs which are primarily targeted
to Chez Scheme, but they work with several more R6RS Schemes.

If provides SRFIs 0, 1, 2, 4, 5, 6, 8, 9, 11, 13, 14, 15, 16, 17, 19, 23,
25, 26, 27, 28, 29, 31, 34, 35, 37, 38, 39, 41, 42, 43, 45, 48, 51, 54, 60,
61, 64, 67, 69, 78, 98, 99, 111, 113, 115, 116, 117, 125, 126, 127, 128, 129,
130, 131, 132, 133, 134, 141, 143, 145, 146, 151, 152, 156, 158 and 219.

SRFIs are available from several packages, but this one is maintained more
actively than other ones.

"""

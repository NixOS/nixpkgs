[package]
name = "nixos-subids"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Manage /etc/subuid and /etc/subgid for NixOS"

[dependencies]
anyhow = "1"
log = "0.4"
env_logger = { version = "0.11", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
